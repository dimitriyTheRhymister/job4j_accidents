<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Просмотр поста</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-blog"></i> Мой блог
        </a>
    </div>
</nav>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0" th:text="${post.title}">Заголовок поста</h4>
                </div>
                <div class="card-body">
                    <p class="card-text" th:text="${post.content}">Содержимое поста</p>

                    <div class="text-muted mt-3">
                        <small>
                            <i class="fas fa-calendar-alt"></i> Создан:
                            <span th:text="${#temporals.format(post.created, 'dd.MM.yyyy HH:mm')}"></span>
                        </small>
                        <br>
                        <small th:if="${post.updated != null and post.updated != post.created}">
                            <i class="fas fa-edit"></i> Обновлен:
                            <span th:text="${#temporals.format(post.updated, 'dd.MM.yyyy HH:mm')}"></span>
                        </small>
                    </div>
                </div>
                <div class="card-footer">
                    <a th:href="@{/}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Назад к списку
                    </a>
                    <a th:href="@{/post/edit/{id}(id=${post.id})}" class="btn btn-primary">
                        <i class="fas fa-edit"></i> Редактировать
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
